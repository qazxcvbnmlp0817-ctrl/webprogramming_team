<!DOCTYPE html>
<!--
  게시판 페이지
  연결 컨트롤러: BoardController (GET /board)
  스타일: Tailwind CSS (Bootstrap 미사용)
  모델 변수:
    - currentPage : "board"
    - featured    : PostDto (대표 게시글)
    - posts       : List<PostDto> (게시글 목록)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 | 학과정보통합서비스</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 아이콘 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 활성 필터 탭 스타일 */
        .active-tab { background-color: #000; color: #fff; }
        .filter-tab:not(.active-tab) { background-color: #fff; color: #000; }
        /* 활성 정렬 버튼 스타일 */
        .active-sort { background-color: #000; color: #fff; }
        .sort-btn:not(.active-sort) { background-color: #fff; color: #000; }
    </style>
</head>
<body class="bg-white text-black font-sans">

<!-- ===== 고정 네비게이션 바 ===== -->
<nav class="fixed top-0 left-0 w-full bg-black text-white z-50 border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">

        <!-- 로고: 메인 페이지로 이동 -->
        <a th:href="@{/}" class="font-bold text-lg tracking-tight hover:opacity-80 transition">
            학과정보통합서비스
        </a>

        <!-- 데스크탑 메뉴 (md 이상에서 표시) -->
        <ul class="hidden md:flex gap-8 text-sm font-medium">
            <li><a th:href="@{/notice}"     class="pb-1 hover:opacity-70 transition border-b-2 border-transparent">공지사항</a></li>
            <!-- 게시판: 현재 페이지 → 흰색 언더라인 활성 표시 -->
            <li><a th:href="@{/board}"      class="pb-1 hover:opacity-70 transition border-b-2 border-white">게시판</a></li>
            <li><a th:href="@{/schedule}"   class="pb-1 hover:opacity-70 transition border-b-2 border-transparent">일정</a></li>
            <li><a th:href="@{/department}" class="pb-1 hover:opacity-70 transition border-b-2 border-transparent">학과정보</a></li>
        </ul>

        <!-- 검색 입력 + 로그인 버튼 (데스크탑) -->
        <div class="hidden md:flex items-center gap-3">
            <div class="flex items-center border border-gray-600 rounded px-2 py-1 gap-2">
                <i class="fas fa-search text-xs opacity-70"></i>
                <input type="text" placeholder="게시글 검색..."
                       class="bg-transparent text-white text-sm outline-none placeholder-gray-500 w-32">
            </div>
            <a th:href="@{/login}"
               class="border border-white text-white text-sm px-3 py-1 rounded hover:bg-white hover:text-black transition">
                로그인
            </a>
        </div>

        <!-- 모바일 햄버거 버튼 -->
        <button onclick="toggleMenu()" class="md:hidden text-white focus:outline-none">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </div>

    <!-- 모바일 드롭다운 메뉴 -->
    <div id="mobileMenu" class="hidden md:hidden bg-black border-t border-gray-700 px-4 py-4 flex flex-col gap-4 text-sm">
        <a th:href="@{/notice}"      class="hover:opacity-70">공지사항</a>
        <a th:href="@{/board}"       class="border-b border-white pb-1 font-medium">게시판</a>
        <a th:href="@{/schedule}"    class="hover:opacity-70">일정</a>
        <a th:href="@{/department}"  class="hover:opacity-70">학과정보</a>
        <a th:href="@{/login}"
           class="mt-2 border border-white text-center py-1 rounded hover:bg-white hover:text-black transition">
            로그인
        </a>
    </div>
</nav>
<!-- ===== 네비게이션 바 끝 ===== -->

<!-- 네비게이션 바 높이(56px)만큼 상단 여백 -->
<div class="pt-14"></div>

<main class="max-w-6xl mx-auto px-4 py-8">

    <!-- ===== 대표 게시글 섹션 (Featured) ===== -->
    <!-- BoardController의 featured(PostDto) 변수 렌더링 -->
    <section class="mb-8">
        <div class="relative border-2 border-black overflow-hidden">
            <!-- 이미지 플레이스홀더 (팀원이 실제 이미지로 교체 예정) -->
            <div class="w-full h-64 bg-gray-200 flex items-center justify-center">
                <i class="fas fa-image text-5xl text-gray-400"></i>
            </div>
            <!-- 제목 오버레이: 이미지 하단 흑색 그라디언트 위에 텍스트 -->
            <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black to-transparent p-5">
                <!-- 카테고리 배지 -->
                <span class="inline-block bg-white text-black text-xs font-bold px-2 py-0.5 mb-2"
                      th:text="${featured.category}">카테고리</span>
                <!-- 게시글 제목 -->
                <h2 class="text-white text-xl font-bold leading-tight"
                    th:text="${featured.title}">대표 게시글 제목</h2>
                <!-- 날짜 및 좋아요 수 -->
                <p class="text-gray-300 text-sm mt-1">
                    <span th:text="${featured.date}">2026-05-11</span>
                    &nbsp;·&nbsp;
                    <i class="fas fa-heart mr-1 text-red-400"></i>
                    <span th:text="${featured.likes}">0</span>
                </p>
            </div>
        </div>
    </section>
    <!-- ===== Featured 끝 ===== -->

    <!-- ===== 제목 검색창 ===== -->
    <div class="mb-4">
        <div class="flex items-center border border-black">
            <i class="fas fa-search px-3 text-gray-400"></i>
            <input id="search-input"
                   type="text"
                   placeholder="제목으로 검색..."
                   oninput="setSearch(this.value)"
                   class="flex-1 py-2 pr-4 text-sm outline-none bg-white">
        </div>
    </div>
    <!-- ===== 검색창 끝 ===== -->

    <!-- ===== 카테고리 필터 탭 + 정렬 버튼 ===== -->
    <div class="flex flex-wrap items-center gap-y-2 mb-6">
        <!-- 왼쪽: 카테고리 버튼 -->
        <div class="flex flex-wrap gap-2">
            <button onclick="setCategory('전체')" data-cat="전체"
                    class="filter-tab active-tab px-4 py-1.5 text-sm border border-black font-medium transition">전체</button>
            <button onclick="setCategory('자유게시판')" data-cat="자유게시판"
                    class="filter-tab px-4 py-1.5 text-sm border border-black font-medium transition">자유게시판</button>
            <button onclick="setCategory('질문')" data-cat="질문"
                    class="filter-tab px-4 py-1.5 text-sm border border-black font-medium transition">질문</button>
            <button onclick="setCategory('스터디')" data-cat="스터디"
                    class="filter-tab px-4 py-1.5 text-sm border border-black font-medium transition">스터디</button>
            <button onclick="setCategory('취업후기')" data-cat="취업후기"
                    class="filter-tab px-4 py-1.5 text-sm border border-black font-medium transition">취업후기</button>
        </div>
        <!-- 오른쪽: 정렬 버튼 -->
        <div class="flex gap-2 ml-auto">
            <button onclick="setSort('최신순')" data-sort="최신순"
                    class="sort-btn active-sort px-3 py-1.5 text-sm border border-black font-medium transition">최신순</button>
            <button onclick="setSort('추천순')" data-sort="추천순"
                    class="sort-btn px-3 py-1.5 text-sm border border-black font-medium transition">추천순</button>
            <button onclick="setSort('댓글순')" data-sort="댓글순"
                    class="sort-btn px-3 py-1.5 text-sm border border-black font-medium transition">댓글순</button>
        </div>
    </div>
    <!-- ===== 필터 탭 + 정렬 버튼 끝 ===== -->

    <!-- ===== 2단 레이아웃: 게시글 목록(좌) + 사이드바(우) ===== -->
    <div class="flex flex-col lg:flex-row gap-8">

        <!-- ===== 왼쪽: 게시글 목록 영역 ===== -->
        <div class="flex-1">
            <!-- 게시글 아이템만 감싸는 컨테이너 (정렬 시 DOM 재배치 대상) -->
            <div id="post-list">
            <div th:each="post : ${posts}"
                 th:attr="data-category=${post.category},data-title=${post.title},data-date=${post.date},data-likes=${post.likes},data-comments=${post.commentCount}"
                 class="post-item flex gap-4 py-4 border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer">

                <!-- 썸네일 플레이스홀더 (팀원이 교체 예정) -->
                <div class="w-20 h-16 bg-gray-200 flex-shrink-0 flex items-center justify-center border border-gray-300">
                    <i class="fas fa-image text-gray-400 text-sm"></i>
                </div>

                <!-- 제목 + 메타 정보 -->
                <div class="flex-1 min-w-0">
                    <a th:href="@{/board}"
                       class="font-semibold text-black hover:underline block leading-snug line-clamp-2"
                       th:text="${post.title}">게시글 제목</a>
                    <!-- 메타 정보: 카테고리 배지 · 날짜 · 좋아요 · 댓글 · 조회수 -->
                    <div class="flex items-center flex-wrap gap-3 mt-1.5 text-xs text-gray-500">
                        <span class="border border-black text-black px-1.5 py-0.5 font-medium"
                              th:text="${post.category}">카테고리</span>
                        <span th:text="${post.date}">2026-05-11</span>
                        <span>
                            <i class="fas fa-heart mr-0.5 text-red-400"></i>
                            <span th:text="${post.likes}">0</span>
                        </span>
                        <span>
                            <i class="fas fa-comment mr-0.5"></i>
                            <span th:text="${post.commentCount}">0</span>
                        </span>
                        <span>
                            <i class="fas fa-eye mr-0.5"></i>
                            <span th:text="${post.viewCount}">0</span>
                        </span>
                    </div>
                </div>
            </div>
            </div><!-- #post-list 끝 -->

            <!-- 게시글이 없을 때 표시 -->
            <div th:if="${#lists.isEmpty(posts)}" class="py-16 text-center text-gray-400">
                <i class="fas fa-inbox text-3xl mb-3 block"></i>
                게시글이 없습니다.
            </div>

            <!-- 페이지네이션 (더미 — 팀원이 실제 로직으로 교체) -->
            <div class="flex justify-center gap-1 mt-8">
                <button class="w-8 h-8 border border-black bg-black text-white text-sm font-medium">1</button>
                <button class="w-8 h-8 border border-black hover:bg-gray-100 text-sm">2</button>
                <button class="w-8 h-8 border border-black hover:bg-gray-100 text-sm">3</button>
                <span class="w-8 h-8 flex items-center justify-center text-gray-400 text-sm">…</span>
                <button class="w-8 h-8 border border-black hover:bg-gray-100 text-sm">10</button>
            </div>
        </div>
        <!-- ===== 게시글 목록 영역 끝 ===== -->

        <!-- ===== 오른쪽: 사이드바 ===== -->
        <aside class="lg:w-72 flex-shrink-0 flex flex-col gap-6">

            <!-- 카테고리별 글 수 위젯 (더미 숫자 — 팀원이 DB 연동 후 교체) -->
            <div class="border-2 border-black">
                <div class="bg-black text-white px-4 py-2 text-sm font-bold">카테고리</div>
                <ul class="divide-y divide-gray-200 text-sm">
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="setCategory('전체')">
                        <span>전체</span><span class="font-medium">9</span>
                    </li>
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="setCategory('자유게시판')">
                        <span>자유게시판</span><span class="font-medium">3</span>
                    </li>
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="setCategory('질문')">
                        <span>질문</span><span class="font-medium">1</span>
                    </li>
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="setCategory('스터디')">
                        <span>스터디</span><span class="font-medium">2</span>
                    </li>
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="setCategory('취업후기')">
                        <span>취업후기</span><span class="font-medium">3</span>
                    </li>
                </ul>
            </div>

            <!-- 인기 게시글 TOP 5 위젯 -->
            <!-- posts 리스트에서 상위 5건만 표시 (iterStat.index 조건) -->
            <div class="border-2 border-black">
                <div class="bg-black text-white px-4 py-2 text-sm font-bold">인기 게시글 TOP 5</div>
                <ul class="divide-y divide-gray-200 text-sm">
                    <li th:each="post, iterStat : ${posts}"
                        th:if="${iterStat.index < 5}"
                        class="px-4 py-2 hover:bg-gray-50">
                        <a th:href="@{/board}"
                           class="block hover:underline leading-snug text-black"
                           th:text="${post.title}">게시글 제목</a>
                        <span class="text-gray-400 text-xs">
                            <i class="fas fa-heart mr-0.5 text-red-400"></i>
                            <span th:text="${post.likes}">0</span>
                        </span>
                    </li>
                </ul>
            </div>
        </aside>
        <!-- ===== 사이드바 끝 ===== -->

    </div>
    <!-- ===== 2단 레이아웃 끝 ===== -->

</main>

<!-- ===== 자바스크립트 ===== -->
<script>
    /* 햄버거 메뉴 토글 (모바일) */
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    /* 현재 필터/정렬 상태 */
    let activeCategory = '전체';
    let activeSort     = '최신순';
    let searchQuery    = '';

    /* 카테고리 선택 */
    function setCategory(category) {
        activeCategory = category;
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.classList.toggle('active-tab', btn.dataset.cat === category);
        });
        applyFilters();
    }

    /* 정렬 기준 선택 */
    function setSort(sort) {
        activeSort = sort;
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.classList.toggle('active-sort', btn.dataset.sort === sort);
        });
        applyFilters();
    }

    /* 검색어 입력 */
    function setSearch(query) {
        searchQuery = query.trim().toLowerCase();
        applyFilters();
    }

    /* 카테고리 + 정렬 + 검색을 동시에 적용 */
    function applyFilters() {
        const container = document.getElementById('post-list');
        const items     = Array.from(document.querySelectorAll('.post-item'));

        /* 1. 카테고리 + 검색어 필터 */
        const filtered = items.filter(item => {
            const catOk    = activeCategory === '전체' || item.dataset.category === activeCategory;
            const searchOk = searchQuery === '' || item.dataset.title.toLowerCase().includes(searchQuery);
            return catOk && searchOk;
        });

        /* 2. 정렬 */
        filtered.sort((a, b) => {
            if (activeSort === '최신순') return b.dataset.date.localeCompare(a.dataset.date);
            if (activeSort === '추천순') return parseInt(b.dataset.likes)    - parseInt(a.dataset.likes);
            if (activeSort === '댓글순') return parseInt(b.dataset.comments) - parseInt(a.dataset.comments);
            return 0;
        });

        /* 3. 전체 숨김 후 필터된 항목만 정렬 순서로 DOM 재배치 */
        items.forEach(item => item.classList.add('hidden'));
        filtered.forEach(item => {
            item.classList.remove('hidden');
            container.appendChild(item);
        });
    }
</script>
<!-- ===== 자바스크립트 끝 ===== -->

</body>
</html>
