<!DOCTYPE html>
<!--
  단과대학 메인 페이지
  연결 컨트롤러: SchoolController (GET /schools/{id})
  모델 변수: school (SchoolDto)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${school.name + ' | 학과정보통합서비스'}">단과대학 | 학과정보통합서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-white text-black font-sans">

<!-- ===== 고정 네비게이션 바 ===== -->
<nav class="fixed top-0 left-0 w-full bg-black text-white z-50 border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">

        <a th:href="@{/universities}" class="font-bold text-lg tracking-tight hover:opacity-80 transition">
            학과정보통합서비스
        </a>

        <!-- 브레드크럼: 대학교 선택 › 대학교명 › 단과대학 선택 › 단과대학명 -->
        <div class="hidden md:flex items-center gap-2 text-sm text-gray-400">
            <a th:href="@{/universities}" class="hover:text-white transition">대학교 선택</a>
            <span class="mx-1">›</span>
            <a th:href="${universityId != null} ? @{/universities/{id}(id=${universityId})} : '/universities'"
               class="hover:text-white transition" th:text="${universityName}">대학교명</a>
            <span class="mx-1">›</span>
            <a th:href="@{/schools}" class="hover:text-white transition">단과대학 선택</a>
            <span class="mx-1">›</span>
            <span class="text-white font-medium" th:text="${school.name}">단과대학명</span>
        </div>

        <div class="hidden md:flex items-center gap-3">
            <a th:href="@{/login}"
               class="border border-white text-white text-sm px-3 py-1 rounded hover:bg-white hover:text-black transition">
                로그인
            </a>
        </div>

        <button onclick="toggleMenu()" class="md:hidden text-white focus:outline-none">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </div>

    <!-- 모바일 드롭다운 -->
    <div id="mobileMenu" class="hidden md:hidden bg-black border-t border-gray-700 px-4 py-4 flex flex-col gap-4 text-sm">
        <a th:href="@{/schools}" class="hover:opacity-70 text-gray-300">
            <i class="fas fa-arrow-left mr-1 text-xs"></i>단과대학 선택으로
        </a>
        <a th:href="@{/universities}" class="hover:opacity-70 text-gray-400 text-xs">
            대학교 선택으로
        </a>
        <a th:href="@{/login}"
           class="mt-2 border border-white text-center py-1 rounded hover:bg-white hover:text-black transition">
            로그인
        </a>
    </div>
</nav>
<!-- ===== 네비게이션 바 끝 ===== -->

<div class="pt-14"></div>

<!-- ===== 히어로 섹션 ===== -->
<section class="bg-black text-white py-16 px-4">
    <div class="max-w-6xl mx-auto text-center">
        <p class="text-gray-500 text-xs mb-3">
            <a th:href="@{/universities}" class="hover:text-gray-300 transition">대학교 선택</a>
            <span class="mx-1">›</span>
            <a th:href="${universityId != null} ? @{/universities/{id}(id=${universityId})} : '/universities'"
               class="hover:text-gray-300 transition" th:text="${universityName}">대학교명</a>
            <span class="mx-1">›</span>
            <a th:href="@{/schools}" class="hover:text-gray-300 transition">단과대학 선택</a>
            <span class="mx-1">›</span>
            <span th:text="${school.name}">단과대학명</span>
        </p>
        <h1 class="text-3xl md:text-4xl font-bold mb-2">
            <i class="fas fa-building mr-3"></i>
            <span th:text="${school.name}">단과대학명</span>
        </h1>
        <p class="text-gray-400 text-sm md:text-base" th:text="${school.description}">단과대학 설명</p>

        <!-- 통계 배지 -->
        <div class="flex justify-center gap-4 mt-6">
            <span class="inline-flex items-center gap-1.5 border border-gray-600 text-gray-300 text-xs px-3 py-1.5">
                <i class="fas fa-layer-group text-xs"></i>
                <span th:text="${#lists.size(school.faculties)}">0</span>개 학부
            </span>
            <span class="inline-flex items-center gap-1.5 border border-gray-600 text-gray-300 text-xs px-3 py-1.5">
                <i class="fas fa-door-open text-xs"></i>
                <span th:text="${school.totalDeptCount}">0</span>개 학과
            </span>
        </div>
    </div>
</section>
<!-- ===== 히어로 섹션 끝 ===== -->

<!-- ===== 본문: 학부·학과 선택 ===== -->
<main class="max-w-6xl mx-auto px-4 py-10">

    <h2 class="text-xl font-bold mb-6 pb-3 border-b-2 border-black flex items-center gap-2">
        <i class="fas fa-list-ul"></i>
        학부·학과 선택
    </h2>

    <!--
      학부 목록 (th:each로 DB 추가 시 자동 반영)
      - 학부명 클릭 → /faculty/{id} (플레이스홀더)
      - 학과 버튼 클릭 → POST /schools/select → 세션 저장 → redirect /
    -->
    <div th:each="faculty : ${school.faculties}" class="mb-8 pl-4 border-l-2 border-gray-200">

        <!-- 학부명 -->
        <div class="mb-3">
            <a th:href="@{/faculty/{id}(id=${faculty.id})}"
               class="inline-flex items-center gap-2 text-lg font-semibold hover:underline transition">
                <i class="fas fa-layer-group text-sm"></i>
                <span th:text="${faculty.name}">학부명</span>
                <i class="fas fa-arrow-right text-xs opacity-50"></i>
            </a>
        </div>

        <!-- 학과 버튼 목록 -->
        <div class="flex flex-wrap gap-2 pl-6">
            <form th:each="dept : ${faculty.depts}"
                  th:action="@{/schools/select}" method="post">
                <input type="hidden" name="deptId"     th:value="${dept.id}">
                <input type="hidden" name="deptName"   th:value="${dept.name}">
                <input type="hidden" name="schoolName" th:value="${school.name}">
                <button type="submit"
                        class="border-2 border-black px-4 py-2 text-sm font-medium
                               hover:bg-black hover:text-white transition"
                        th:text="${dept.name}">
                    학과명
                </button>
            </form>
        </div>

    </div>

</main>
<!-- ===== 본문 끝 ===== -->

<script>
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    }
</script>

</body>
</html>
