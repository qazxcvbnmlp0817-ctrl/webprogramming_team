<!DOCTYPE html>
<!--
  대학교 메인 페이지 (bridge page)
  연결 컨트롤러: UniversityController (GET /universities/{id})
  모델 변수: university (UniversityDto), today (String)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${university.name + ' | 학과정보통합서비스'}">대학교 | 학과정보통합서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-white text-black font-sans">

<!-- ===== 네비게이션 (학과 메인 페이지와 동일한 구조) ===== -->
<nav class="fixed top-0 left-0 w-full bg-black text-white z-50 border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">

        <a th:href="@{/universities}" class="font-bold text-lg tracking-tight hover:opacity-80 transition">
            학과정보통합서비스
        </a>

        <!-- 데스크탑 메뉴 -->
        <ul class="hidden md:flex gap-8 text-sm font-medium">
            <li>
                <a th:href="@{/schools}"
                   class="pb-1 hover:opacity-70 transition border-b-2 border-white text-white">
                    <i class="fas fa-list-ul mr-1 text-xs"></i>학부·학과 선택
                </a>
            </li>
            <li><a th:href="@{/notice}"     class="pb-1 hover:opacity-70 transition border-b-2 border-transparent text-gray-300">공지사항</a></li>
            <li><a th:href="@{/board}"      class="pb-1 hover:opacity-70 transition border-b-2 border-transparent text-gray-300">게시판</a></li>
            <li><a th:href="@{/schedule}"   class="pb-1 hover:opacity-70 transition border-b-2 border-transparent text-gray-300">일정</a></li>
        </ul>

        <!-- 브레드크럼 + 로그인 -->
        <div class="hidden md:flex items-center gap-3 text-sm text-gray-400">
            <span>
                <a th:href="@{/universities}" class="hover:text-white transition">대학교 선택</a>
                <span class="mx-1">›</span>
                <span class="text-white font-medium" th:text="${university.name}">대학교명</span>
            </span>
            <a th:href="@{/login}"
               class="border border-white text-white text-sm px-3 py-1 rounded hover:bg-white hover:text-black transition">
                로그인
            </a>
        </div>

        <button onclick="toggleMenu()" class="md:hidden text-white focus:outline-none">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </div>

    <!-- 모바일 드롭다운 -->
    <div id="mobileMenu" class="hidden md:hidden bg-black border-t border-gray-700 px-4 py-4 flex flex-col gap-4 text-sm">
        <a th:href="@{/universities}" class="hover:opacity-70 text-gray-300">
            <i class="fas fa-arrow-left mr-1 text-xs"></i>대학교 선택으로
        </a>
        <a th:href="@{/schools}"  class="hover:opacity-70">학부·학과 선택</a>
        <a th:href="@{/notice}"   class="hover:opacity-70 text-gray-300">공지사항</a>
        <a th:href="@{/board}"    class="hover:opacity-70 text-gray-300">게시판</a>
        <a th:href="@{/schedule}" class="hover:opacity-70 text-gray-300">일정</a>
        <a th:href="@{/login}"
           class="mt-2 border border-white text-center py-1 rounded hover:bg-white hover:text-black transition">
            로그인
        </a>
    </div>
</nav>

<div class="pt-14"></div>

<!-- ===== 히어로 (학과 메인 페이지와 동일한 스타일) ===== -->
<section class="bg-black text-white py-16 px-4">
    <div class="max-w-6xl mx-auto text-center">
        <p class="text-gray-500 text-xs mb-3">
            <a th:href="@{/universities}" class="hover:text-gray-300 transition">대학교 선택</a>
            <span class="mx-1">›</span>
            <span th:text="${university.name}">대학교명</span>
        </p>
        <h1 class="text-3xl md:text-4xl font-bold mb-2">
            <i class="fas fa-university mr-3"></i>
            <span th:text="${university.name}">대학교명</span>
        </h1>
        <p class="text-gray-400 text-sm md:text-base mb-2" th:text="${today}">날짜</p>
        <p class="text-gray-400 text-sm md:text-base" th:text="${university.description}">설명</p>

        <!-- 통계 배지 (D-Day 배지와 동일한 스타일) -->
        <div class="flex justify-center gap-3 mt-6">
            <span class="inline-flex items-center gap-1.5 border border-white text-white text-xs px-3 py-1.5">
                <i class="fas fa-building text-xs"></i>
                <span th:text="${#lists.size(university.schools)}">0</span>개 단과대학
            </span>
            <span class="inline-flex items-center gap-1.5 border border-white text-white text-xs px-3 py-1.5">
                <i class="fas fa-door-open text-xs"></i>
                <span th:text="${university.totalDeptCount}">0</span>개 학과
            </span>
        </div>
    </div>
</section>

<!-- ===== 본문 (학과 메인 페이지와 동일한 레이아웃) ===== -->
<main class="max-w-6xl mx-auto px-4 py-10">

    <!-- ── 학부·학과 선택 CTA (핵심 기능) ──────────────────── -->
    <div class="border-2 border-black mb-10">
        <div class="bg-black text-white px-6 py-4 flex items-center gap-3">
            <i class="fas fa-list-ul"></i>
            <span class="font-bold">학부·학과 선택</span>
        </div>
        <div class="px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <p class="text-lg font-semibold mb-1">원하는 학과를 선택하세요</p>
                <p class="text-sm text-gray-500">
                    단과대학 → 학부 → 학과 순서로 선택하면 해당 학과 포털로 이동합니다.
                </p>
            </div>
            <a th:href="@{/schools}"
               class="flex-shrink-0 flex items-center gap-2 bg-black text-white
                      px-8 py-3 font-bold text-sm hover:bg-gray-800 transition whitespace-nowrap">
                학부·학과 선택하기
                <i class="fas fa-arrow-right text-xs"></i>
            </a>
        </div>
    </div>

    <!-- ── 소속 단과대학 미리보기 (3열 그리드) ──────────────── -->
    <h2 class="text-base font-bold mb-4 flex items-center gap-2 text-gray-700">
        <i class="fas fa-building text-sm"></i>소속 단과대학
    </h2>
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-10">
        <a th:each="school : ${university.schools}"
           th:href="@{/schools/{id}(id=${school.id})}"
           class="group border border-gray-200 p-4 hover:border-black hover:bg-black hover:text-white transition text-sm">
            <p class="font-semibold mb-1" th:text="${school.name}">단과대학명</p>
            <p class="text-xs text-gray-400 group-hover:text-gray-300"
               th:text="${#lists.size(school.faculties)} + '개 학부 · ' + ${school.totalDeptCount} + '개 학과'">
                0개 학부 · 0개 학과
            </p>
        </a>
    </div>

    <!-- ── 빠른 바로가기 (학과 메인 페이지와 동일한 구조) ───── -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <a th:href="@{/notice}"
           class="flex flex-col items-center gap-3 py-6 border-2 border-black
                  hover:bg-black hover:text-white transition font-medium text-sm">
            <i class="fas fa-bullhorn text-2xl"></i>공지사항
        </a>
        <a th:href="@{/board}"
           class="flex flex-col items-center gap-3 py-6 border-2 border-black
                  hover:bg-black hover:text-white transition font-medium text-sm">
            <i class="fas fa-comments text-2xl"></i>게시판
        </a>
        <a th:href="@{/schedule}"
           class="flex flex-col items-center gap-3 py-6 border-2 border-black
                  hover:bg-black hover:text-white transition font-medium text-sm">
            <i class="fas fa-calendar-alt text-2xl"></i>일정
        </a>
        <a th:href="@{/department}"
           class="flex flex-col items-center gap-3 py-6 border-2 border-black
                  hover:bg-black hover:text-white transition font-medium text-sm">
            <i class="fas fa-university text-2xl"></i>학과정보
        </a>
    </div>

</main>

<script>
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    }
</script>
</body>
</html>
