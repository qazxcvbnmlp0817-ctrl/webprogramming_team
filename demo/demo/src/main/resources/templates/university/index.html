<!DOCTYPE html>
<!--
  대학교 선택 페이지 — Entry Point
  연결 컨트롤러: UniversityController (GET /universities)
  모델 변수: universities (List<UniversityDto>)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학교 선택 | 학과정보통합서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-white text-black font-sans">

<!-- ===== 네비게이션 ===== -->
<nav class="fixed top-0 left-0 w-full bg-black text-white z-50 border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <a th:href="@{/universities}" class="font-bold text-lg tracking-tight hover:opacity-80 transition">
            학과정보통합서비스
        </a>
        <div class="hidden md:flex items-center gap-3">
            <a th:href="@{/login}"
               class="border border-white text-white text-sm px-3 py-1 rounded hover:bg-white hover:text-black transition">
                로그인
            </a>
        </div>
        <button onclick="toggleMenu()" class="md:hidden text-white focus:outline-none">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </div>
    <div id="mobileMenu" class="hidden md:hidden bg-black border-t border-gray-700 px-4 py-4 flex flex-col gap-4 text-sm">
        <a th:href="@{/login}"
           class="mt-2 border border-white text-center py-1 rounded hover:bg-white hover:text-black transition">
            로그인
        </a>
    </div>
</nav>

<div class="pt-14"></div>

<!-- ===== 히어로 ===== -->
<section class="bg-black text-white py-16 px-4">
    <div class="max-w-6xl mx-auto text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">
            <i class="fas fa-university mr-3"></i>대학교 선택
        </h1>
        <p class="text-gray-400 text-sm md:text-base">소속 대학교를 선택하세요</p>
    </div>
</section>

<!-- ===== 대학교 카드 그리드 ===== -->
<main class="max-w-6xl mx-auto px-4 py-10">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <a th:each="univ : ${universities}"
           th:href="@{/universities/{id}(id=${univ.id})}"
           class="group block border-2 border-black p-8 hover:bg-black hover:text-white transition cursor-pointer">

            <div class="flex items-start gap-4">
                <i class="fas fa-university text-3xl mt-0.5 flex-shrink-0"></i>
                <div class="flex-1 min-w-0">
                    <h2 class="text-2xl font-bold mb-2" th:text="${univ.name}">대학교명</h2>
                    <p class="text-sm text-gray-500 group-hover:text-gray-300 leading-snug"
                       th:text="${univ.description}">대학교 설명</p>
                    <div class="mt-4 flex gap-4 text-xs text-gray-400 group-hover:text-gray-400">
                        <span>
                            <i class="fas fa-building mr-1"></i>
                            <span th:text="${#lists.size(univ.schools)}">0</span>개 단과대학
                        </span>
                        <span>
                            <i class="fas fa-door-open mr-1"></i>
                            <span th:text="${univ.totalDeptCount}">0</span>개 학과
                        </span>
                    </div>
                </div>
            </div>

            <div class="mt-6 pt-5 border-t border-gray-200 group-hover:border-gray-600
                        flex items-center justify-between text-sm font-medium">
                <span>대학교 입장</span>
                <i class="fas fa-arrow-right text-xs transition-transform group-hover:translate-x-1"></i>
            </div>

        </a>

    </div>
</main>

<script>
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    }
</script>
</body>
</html>
