<!DOCTYPE html>
<!--
  공지사항 페이지
  연결 컨트롤러: NoticeController (GET /notice)
  스타일: Tailwind CSS (Bootstrap 미사용)
  모델 변수:
    - currentPage : "notice"
    - featured    : NoticeDto (긴급 공지)
    - notices     : List<NoticeDto> (공지 목록)
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 | 학과정보통합서비스</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 아이콘 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 활성 필터 탭 스타일 */
        .active-tab { background-color: #000; color: #fff; }
        .filter-tab:not(.active-tab) { background-color: #fff; color: #000; }
    </style>
</head>
<body class="bg-white text-black font-sans">

<!-- ===== 고정 네비게이션 바 ===== -->
<!-- 스크롤해도 상단에 고정 (fixed top-0) -->
<nav class="fixed top-0 left-0 w-full bg-black text-white z-50 border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">

        <!-- 로고: 메인 페이지로 이동 -->
        <a th:href="@{/}" class="font-bold text-lg tracking-tight hover:opacity-80 transition">
            학과정보통합서비스
        </a>

        <!-- 데스크탑 메뉴 (md 이상에서 표시) -->
        <ul class="hidden md:flex gap-8 text-sm font-medium">
            <!-- 공지사항: 현재 페이지 → 흰색 언더라인 활성 표시 -->
            <li>
                <a th:href="@{/notice}" class="pb-1 hover:opacity-70 transition border-b-2 border-white">
                    공지사항
                </a>
            </li>
            <li><a th:href="@{/board}"      class="pb-1 hover:opacity-70 transition border-b-2 border-transparent">게시판</a></li>
            <li><a th:href="@{/schedule}"   class="pb-1 hover:opacity-70 transition border-b-2 border-transparent">일정</a></li>
            <li><a th:href="@{/department}" class="pb-1 hover:opacity-70 transition border-b-2 border-transparent">학과정보</a></li>
        </ul>

        <!-- 검색 입력 + 로그인 버튼 (데스크탑) -->
        <div class="hidden md:flex items-center gap-3">
            <div class="flex items-center border border-gray-600 rounded px-2 py-1 gap-2">
                <i class="fas fa-search text-xs opacity-70"></i>
                <input type="text" placeholder="공지 검색..."
                       class="bg-transparent text-white text-sm outline-none placeholder-gray-500 w-32">
            </div>
            <a th:href="@{/login}"
               class="border border-white text-white text-sm px-3 py-1 rounded hover:bg-white hover:text-black transition">
                로그인
            </a>
        </div>

        <!-- 모바일 햄버거 버튼 (md 미만에서 표시) -->
        <button onclick="toggleMenu()" class="md:hidden text-white focus:outline-none">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </div>

    <!-- 모바일 드롭다운 메뉴 (기본 숨김) -->
    <div id="mobileMenu" class="hidden md:hidden bg-black border-t border-gray-700 px-4 py-4 flex flex-col gap-4 text-sm">
        <a th:href="@{/notice}"      class="border-b border-white pb-1 font-medium">공지사항</a>
        <a th:href="@{/board}"       class="hover:opacity-70">게시판</a>
        <a th:href="@{/schedule}"    class="hover:opacity-70">일정</a>
        <a th:href="@{/department}"  class="hover:opacity-70">학과정보</a>
        <a th:href="@{/login}"
           class="mt-2 border border-white text-center py-1 rounded hover:bg-white hover:text-black transition">
            로그인
        </a>
    </div>
</nav>
<!-- ===== 네비게이션 바 끝 ===== -->

<!-- 네비게이션 바 높이(56px)만큼 상단 여백 -->
<div class="pt-14"></div>

<main class="max-w-6xl mx-auto px-4 py-8">

    <!-- ===== 긴급/대표 공지 섹션 (Featured) ===== -->
    <!-- NoticeController의 featured(NoticeDto) 변수 렌더링 -->
    <section class="mb-8">
        <div class="relative border-2 border-black overflow-hidden">
            <!-- 이미지 플레이스홀더 (팀원이 실제 이미지로 교체 예정) -->
            <div class="w-full h-64 bg-gray-200 flex items-center justify-center">
                <i class="fas fa-image text-5xl text-gray-400"></i>
            </div>
            <!-- 제목 오버레이: 이미지 하단 흑색 그라디언트 위에 텍스트 -->
            <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black to-transparent p-5">
                <!-- 카테고리 배지 -->
                <span class="inline-block bg-white text-black text-xs font-bold px-2 py-0.5 mb-2"
                      th:text="${featured.category}">카테고리</span>
                <!-- 공지 제목 -->
                <h2 class="text-white text-xl font-bold leading-tight"
                    th:text="${featured.title}">긴급 공지 제목</h2>
                <!-- 날짜 및 조회수 -->
                <p class="text-gray-300 text-sm mt-1">
                    <span th:text="${featured.date}">2026-05-11</span>
                    &nbsp;·&nbsp;
                    <i class="fas fa-eye mr-1"></i>
                    <span th:text="${featured.viewCount}">0</span>
                </p>
            </div>
        </div>
    </section>
    <!-- ===== Featured 끝 ===== -->

    <!-- ===== 카테고리 필터 탭 ===== -->
    <!-- 클릭 시 filterNotices(category) 호출 → 해당 카테고리 행만 표시 -->
    <div class="flex flex-wrap gap-2 mb-6">
        <button onclick="filterNotices('전체')" data-cat="전체"
                class="filter-tab active-tab px-4 py-1.5 text-sm border border-black font-medium transition">전체</button>
        <button onclick="filterNotices('학사')" data-cat="학사"
                class="filter-tab px-4 py-1.5 text-sm border border-black font-medium transition">학사</button>
        <button onclick="filterNotices('장학')" data-cat="장학"
                class="filter-tab px-4 py-1.5 text-sm border border-black font-medium transition">장학</button>
        <button onclick="filterNotices('행사')" data-cat="행사"
                class="filter-tab px-4 py-1.5 text-sm border border-black font-medium transition">행사</button>
        <button onclick="filterNotices('취업')" data-cat="취업"
                class="filter-tab px-4 py-1.5 text-sm border border-black font-medium transition">취업</button>
    </div>
    <!-- ===== 필터 탭 끝 ===== -->

    <!-- ===== 2단 레이아웃: 공지 목록(좌) + 사이드바(우) ===== -->
    <!-- 모바일: 세로 단일 컬럼 / 데스크탑(lg): 가로 2단 -->
    <div class="flex flex-col lg:flex-row gap-8">

        <!-- ===== 왼쪽: 공지 목록 영역 ===== -->
        <div class="flex-1">
            <!-- notices(List<NoticeDto>) 반복 렌더링 -->
            <!-- data-category 속성: JS 필터링에서 카테고리 매칭에 사용 -->
            <div th:each="notice : ${notices}"
                 th:attr="data-category=${notice.category}"
                 class="notice-item flex gap-4 py-4 border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer">

                <!-- 썸네일 이미지 플레이스홀더 (팀원이 교체 예정) -->
                <div class="w-20 h-16 bg-gray-200 flex-shrink-0 flex items-center justify-center border border-gray-300">
                    <i class="fas fa-image text-gray-400 text-sm"></i>
                </div>

                <!-- 제목 + 메타 정보 -->
                <div class="flex-1 min-w-0">
                    <!-- 제목 클릭 시 상세 페이지 이동 (팀원이 URL 교체 예정) -->
                    <a th:href="@{/notice}"
                       class="font-semibold text-black hover:underline block leading-snug line-clamp-2"
                       th:text="${notice.title}">공지 제목</a>
                    <!-- 메타 정보: 카테고리 배지 · 날짜 · 조회수 -->
                    <div class="flex items-center flex-wrap gap-3 mt-1.5 text-xs text-gray-500">
                        <span class="border border-black text-black px-1.5 py-0.5 font-medium"
                              th:text="${notice.category}">카테고리</span>
                        <span th:text="${notice.date}">2026-05-11</span>
                        <span>
                            <i class="fas fa-eye mr-0.5"></i>
                            <span th:text="${notice.viewCount}">0</span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- 공지가 없을 때 표시 -->
            <div th:if="${#lists.isEmpty(notices)}" class="py-16 text-center text-gray-400">
                <i class="fas fa-inbox text-3xl mb-3 block"></i>
                공지사항이 없습니다.
            </div>

            <!-- 페이지네이션 (더미 — 팀원이 실제 로직으로 교체) -->
            <div class="flex justify-center gap-1 mt-8">
                <button class="w-8 h-8 border border-black bg-black text-white text-sm font-medium">1</button>
                <button class="w-8 h-8 border border-black hover:bg-gray-100 text-sm">2</button>
                <button class="w-8 h-8 border border-black hover:bg-gray-100 text-sm">3</button>
                <span class="w-8 h-8 flex items-center justify-center text-gray-400 text-sm">…</span>
                <button class="w-8 h-8 border border-black hover:bg-gray-100 text-sm">10</button>
            </div>
        </div>
        <!-- ===== 공지 목록 영역 끝 ===== -->

        <!-- ===== 오른쪽: 사이드바 ===== -->
        <!-- 모바일에서는 목록 아래로 내려옴 / 데스크탑에서는 오른쪽 고정 폭 -->
        <aside class="lg:w-72 flex-shrink-0 flex flex-col gap-6">

            <!-- 카테고리별 글 수 위젯 (더미 숫자 — 팀원이 DB 연동 후 교체) -->
            <div class="border-2 border-black">
                <div class="bg-black text-white px-4 py-2 text-sm font-bold">카테고리</div>
                <ul class="divide-y divide-gray-200 text-sm">
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="filterNotices('전체')">
                        <span>전체</span><span class="font-medium">32</span>
                    </li>
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="filterNotices('학사')">
                        <span>학사</span><span class="font-medium">14</span>
                    </li>
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="filterNotices('장학')">
                        <span>장학</span><span class="font-medium">8</span>
                    </li>
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="filterNotices('행사')">
                        <span>행사</span><span class="font-medium">6</span>
                    </li>
                    <li class="flex justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer"
                        onclick="filterNotices('취업')">
                        <span>취업</span><span class="font-medium">4</span>
                    </li>
                </ul>
            </div>

            <!-- 최근 공지 5건 위젯 -->
            <!-- notices 리스트에서 상위 5건만 표시 (iterStat.index 조건) -->
            <div class="border-2 border-black">
                <div class="bg-black text-white px-4 py-2 text-sm font-bold">최근 공지</div>
                <ul class="divide-y divide-gray-200 text-sm">
                    <li th:each="notice, iterStat : ${notices}"
                        th:if="${iterStat.index < 5}"
                        class="px-4 py-2 hover:bg-gray-50">
                        <!-- 제목 클릭 시 상세 페이지 이동 (팀원이 URL 교체 예정) -->
                        <a th:href="@{/notice}"
                           class="block hover:underline leading-snug text-black"
                           th:text="${notice.title}">공지 제목</a>
                        <span class="text-gray-400 text-xs" th:text="${notice.date}">날짜</span>
                    </li>
                </ul>
            </div>
        </aside>
        <!-- ===== 사이드바 끝 ===== -->

    </div>
    <!-- ===== 2단 레이아웃 끝 ===== -->

</main>

<!-- ===== 자바스크립트 ===== -->
<script>
    /* 햄버거 메뉴 토글 (모바일) */
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    /* 카테고리 필터: 선택된 카테고리의 notice-item만 표시 */
    function filterNotices(category) {
        // 탭 활성 스타일 전환 (선택 탭 → 검정 배경 / 나머지 → 흰 배경)
        document.querySelectorAll('.filter-tab').forEach(btn => {
            if (btn.dataset.cat === category) {
                btn.classList.add('active-tab');
                btn.classList.remove('bg-white', 'text-black');
            } else {
                btn.classList.remove('active-tab');
            }
        });

        // 공지 항목 표시/숨김: data-category와 선택 카테고리 비교
        document.querySelectorAll('.notice-item').forEach(item => {
            const show = category === '전체' || item.dataset.category === category;
            item.classList.toggle('hidden', !show);
        });
    }
</script>
<!-- ===== 자바스크립트 끝 ===== -->

</body>
</html>
