<!DOCTYPE html>
<!--
  학부·학과 통합 선택 페이지 (단과대학 → 학부 → 학과 한 화면에서 선택)
  연결 컨트롤러: SchoolController (GET /schools)
  모델 변수:
    - schools        : List<SchoolDto> (선택된 대학교 소속 단과대학 목록)
    - universityId   : Long
    - universityName : String
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${universityName + ' — 학부·학과 선택 | 학과정보통합서비스'}">학부·학과 선택 | 학과정보통합서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-white text-black font-sans">

<!-- ===== 네비게이션 ===== -->
<nav class="fixed top-0 left-0 w-full bg-black text-white z-50 border-b border-gray-800">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">

        <a th:href="@{/universities}" class="font-bold text-lg tracking-tight hover:opacity-80 transition">
            학과정보통합서비스
        </a>

        <!-- 브레드크럼: 대학교 선택 › 대학교명 › 학부·학과 선택 -->
        <div class="hidden md:flex items-center gap-2 text-sm text-gray-400">
            <a th:href="@{/universities}" class="hover:text-white transition">대학교 선택</a>
            <span>›</span>
            <a th:href="${universityId != null} ? @{/universities/{id}(id=${universityId})} : '/universities'"
               class="hover:text-white transition" th:text="${universityName}">대학교명</a>
            <span>›</span>
            <span class="text-white">학부·학과 선택</span>
        </div>

        <div class="hidden md:flex items-center gap-3">
            <a th:href="@{/login}"
               class="border border-white text-white text-sm px-3 py-1 rounded hover:bg-white hover:text-black transition">
                로그인
            </a>
        </div>
        <button onclick="toggleMenu()" class="md:hidden text-white focus:outline-none">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </div>

    <!-- 모바일 메뉴 -->
    <div id="mobileMenu" class="hidden md:hidden bg-black border-t border-gray-700 px-4 py-4 flex flex-col gap-3 text-sm">
        <a th:href="@{/universities}" class="text-gray-300 hover:opacity-70">
            <i class="fas fa-arrow-left mr-1 text-xs"></i>대학교 선택으로
        </a>
        <a th:href="${universityId != null} ? @{/universities/{id}(id=${universityId})} : '/universities'"
           class="text-gray-400 hover:opacity-70 text-xs" th:text="${universityName}">대학교명</a>
        <a th:href="@{/login}"
           class="mt-2 border border-white text-center py-1 rounded hover:bg-white hover:text-black transition">
            로그인
        </a>
    </div>
</nav>

<div class="pt-14"></div>

<!-- ===== 히어로 ===== -->
<section class="bg-black text-white py-14 px-4">
    <div class="max-w-6xl mx-auto text-center">
        <p class="text-gray-500 text-xs mb-3">
            <a th:href="@{/universities}" class="hover:text-gray-300 transition">대학교 선택</a>
            <span class="mx-1">›</span>
            <a th:href="${universityId != null} ? @{/universities/{id}(id=${universityId})} : '/universities'"
               class="hover:text-gray-300 transition" th:text="${universityName}">대학교명</a>
            <span class="mx-1">›</span>
            <span>학부·학과 선택</span>
        </p>
        <h1 class="text-3xl md:text-4xl font-bold mb-2">
            <i class="fas fa-list-ul mr-3"></i>학부·학과 선택
        </h1>
        <p class="text-gray-400 text-sm md:text-base">
            <span th:text="${universityName}">대학교명</span> 소속 학과를 선택하세요
        </p>
    </div>
</section>

<!-- ===== 본문: 단과대학 → 학부 → 학과 통합 문서형 레이아웃 ===== -->
<!--
  구조: 단과대학(h2) > 학부(링크) > 학과(버튼 폼)
  th:each 루프가 선택된 대학교의 모든 단과대학을 자동 렌더링
-->
<main class="max-w-6xl mx-auto px-4 py-10">

    <div th:each="school : ${schools}" class="mb-14">

        <!-- 단과대학 헤더 -->
        <h2 class="text-xl font-bold pb-3 mb-6 border-b-2 border-black flex items-center gap-2">
            <i class="fas fa-building text-base"></i>
            <span th:text="${school.name}">단과대학명</span>
        </h2>

        <!-- 학부 목록 -->
        <div th:each="faculty : ${school.faculties}" class="mb-8 pl-4 border-l-2 border-gray-200">

            <!-- 학부명: 클릭 시 학부 페이지로 이동 -->
            <div class="mb-3">
                <a th:href="@{/faculty/{id}(id=${faculty.id})}"
                   class="inline-flex items-center gap-2 text-base font-semibold hover:underline transition">
                    <i class="fas fa-layer-group text-sm text-gray-500"></i>
                    <span th:text="${faculty.name}">학부명</span>
                    <i class="fas fa-arrow-right text-xs opacity-40"></i>
                </a>
            </div>

            <!-- 학과 버튼 목록: 클릭 → POST /schools/select → 세션 저장 → redirect / -->
            <div class="flex flex-wrap gap-2 pl-6">
                <form th:each="dept : ${faculty.depts}"
                      th:action="@{/schools/select}" method="post">
                    <input type="hidden" name="deptId"     th:value="${dept.id}">
                    <input type="hidden" name="deptName"   th:value="${dept.name}">
                    <input type="hidden" name="schoolName" th:value="${school.name}">
                    <button type="submit"
                            class="border-2 border-black px-4 py-2 text-sm font-medium
                                   hover:bg-black hover:text-white transition"
                            th:text="${dept.name}">
                        학과명
                    </button>
                </form>
            </div>

        </div>

    </div>

</main>

<script>
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('hidden');
    }
</script>
</body>
</html>
